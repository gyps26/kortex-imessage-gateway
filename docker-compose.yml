version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/kortex-imessage-gateway
      - REDIS_URL=redis://redis:6379
      - API_SECRET=my_super_secret_for_mac_workers
      - APP_URL=http://localhost:3000
    depends_on:
      - mongodb
      - redis

  whatsapp-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker:whatsapp
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/kortex-imessage-gateway
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
